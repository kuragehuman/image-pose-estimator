<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MediaPipe VRM</title>
<style>
body { margin:0; overflow:hidden; }
video { position:absolute; left:10px; top:10px; width:240px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.1/lib/three-vrm.module.js"
  }
}
</script>
</script>
</head>

<body>

<video id="video" autoplay playsinline></video>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/kalidokit/dist/kalidokit.umd.js"></script>

<script type="module">

import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { VRM } from "@pixiv/three-vrm";
import { VRMLoaderPlugin } from "@pixiv/three-vrm";

let currentVrm;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  35,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0, 1.4, 2);
camera.lookAt(0, 1.4, 0);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff);
light.position.set(1,1,1);
scene.add(light);

const loader = new GLTFLoader();
loader.register(parser => new VRMLoaderPlugin(parser));

loader.load("tst2025_2.vrm",(gltf)=>{

    currentVrm = gltf.userData.vrm;

    scene.add(currentVrm.scene);

    currentVrm.scene.rotation.y = Math.PI;

});

function animate(){

    requestAnimationFrame(animate);

    if(currentVrm){
        currentVrm.update(0);
    }

    renderer.render(scene,camera);
}

animate();


function rigRotation(name, rotation, dampener = 1) {

    if (!currentVrm || !rotation) return;

    const boneName =
        name.charAt(0).toLowerCase() + name.slice(1);

    const bone =
        currentVrm.humanoid.getNormalizedBoneNode(boneName);

    if (!bone) return;

    const targetX = rotation.x * dampener;
    const targetY = rotation.y * dampener;
    const targetZ = rotation.z * dampener;

    const smooth = 0.5;

    bone.rotation.x += (targetX - bone.rotation.x) * smooth;
    bone.rotation.y += (targetY - bone.rotation.y) * smooth;
    bone.rotation.z += (targetZ - bone.rotation.z) * smooth;
}

function normalizePose(landmarks){

    if(!landmarks) return null;

    return landmarks.map(lm => {
        return {
            x: lm.x ?? 0,
            y: lm.y ?? 0,
            z: lm.z ?? 0,
            visibility: lm.visibility ?? 1
        };
    });
}

function animateVRM(pose){

    if (!currentVrm) return;

    let landmarks;
    let worldlandmarks;

    if (pose?.poseLandmarks) landmarks = pose.poseLandmarks;
    else return;

    if (pose?.poseWorldLandmarks) worldlandmarks = pose.poseWorldLandmarks;
    else return;

    if (!Array.isArray(landmarks)) return;
    if (landmarks.length !== 33) return;

    let riggedPose;

    try{

        riggedPose = Kalidokit.Pose.solve(
            landmarks,
            worldlandmarks,
            {
                runtime:"mediapipe",
                video:video
            }
        );

    }catch(e){

        console.warn("Kalidokit error",e);
        return;

    }

    if(!riggedPose) return;

    // 全ボーン適用
    Object.entries(riggedPose).forEach(([name,data])=>{

        if(!data) return;

        const rotation = data.rotation ?? data;

        if(!rotation) return;

        // 腰だけ弱め
        const damp = name === "Hips" ? 0.7 : 1;

        rigRotation(name,rotation,damp);

    });
}

const video = document.getElementById("video");
video.style.transform = "scaleX(-1)";

const pose = new Pose({
    locateFile:(file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
    }
});

pose.setOptions({
    modelComplexity:1,
    smoothLandmarks:true
});

pose.onResults(results=>{
    if(results.poseLandmarks){
        animateVRM(results);
    }
});


const cameraMP = new Camera(video,{
    onFrame: async ()=>{
        await pose.send({image:video});
    },
    width:640,
    height:480
});

cameraMP.start();

</script>
</body>
</html>
